name: Get Runner IP
on: [workflow_dispatch]  # Manual trigger to test
jobs:
  ip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Public IP: $(curl -s https://api.ipify.org)"
          echo "Local IP: $(hostname -I | awk '{print $1}')"
      - run: sleep 10